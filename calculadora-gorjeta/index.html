<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Gorjeta</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img src="./assets/logo.svg" alt="calculadora-gorjeta" class="logo-header">
    </header>

    <main class="container-geral">
        <div class="card">
            <section class="lado-esquerdo">
                <div class="grupo-input">
                    <label for="conta">Conta</label>
                    <div class="input-wrapper">
                        <img src="./assets/icon-dollar.svg" alt="">
                        <input type="number" id="conta" placeholder="0" step="0.01">
                    </div>
                </div>
                <div class="grupo-gorjeta">
                    <div class="grupo-botoes">
                        <button type="button" class="btn-gorjeta" data-valor="5">5%</button>
                        <button type="button" class="btn-gorjeta" data-valor="10">10%</button>
                        <button type="button" class="btn-gorjeta" data-valor="15">15%</button>
                        <button type="button" class="btn-gorjeta" data-valor="25">25%</button>
                        <button type="button" class="btn-gorjeta" data-valor="50">50%</button>
                        <input type="number" id="customizado" placeholder="Custom">
                    </div>
                </div>

                <div class="grupo-input">
                    <div class="label-erro-container">
                        <label for="pessoas">Número de Pessoas</label>
                        <span id="msg-erro">Não pode ser zero</span>
                    </div>
                    <div class="input-wrapper">
                        <img src="./assets/icon-person.svg" alt="">
                        <input type="number" id="pessoas" placeholder="0">
                    </div>
                </div>
            </section>

            <section class="lado-direito">
                <div class="container-resultados">
                    <div class="linha-resultado">
                        <div class="texto">
                            <strong>Gorjeta</strong>
                            <span>/pessoa</span>
                        </div>
                        <div class="valor">$<span id="valor-gorjeta">0.00</span></div>
                    </div>

                    <div class="linha-resultado">
                        <div class="texto">
                            <strong>Total</strong>
                            <span>/pessoa</span>
                        </div>
                        <div class="valor">$<span id="valor-total">0.00</span></div>
                    </div>
                </div>
                <button id="btn-resetar" disabled>RESET</button>
            </section>
        </div>
    </main>
    <script src="scripts.js"></script>
</body>
</html>
